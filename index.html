<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Georgian Library</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: red;
      font-size: 40px;
      text-shadow: 0 0 10px red, 0 0 30px red;
    }

    input {
      width: 80%;
      padding: 15px;
      border-radius: 20px;
      border: none;
      margin: 20px 0;
      font-size: 18px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 20px 40px;
      font-size: 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, red, orange, yellow, green, blue);
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    #result {
      margin-top: 30px;
    }

    .card {
      background: #111;
      border: 2px solid red;
      border-radius: 20px;
      padding: 15px;
      margin: 15px auto;
      width: 80%;
      max-width: 400px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <h1>📚 Georgian Library</h1>

  <!-- 🔍 SEARCH -->
  <input type="text" id="search" placeholder="ძებნა..." oninput="searchData()">

  <!-- 🎯 BUTTONS -->
  <div class="buttons">
    <button class="btn" onclick="showBooks()">📚 წიგნები</button>
    <button class="btn" onclick="showArtists()">🎨 მხატვრები</button>
  </div>

  <!-- 📦 RESULT -->
  <div id="result"></div>

  <script>
    let currentData = [];

    const books = [
      { name: "ვეფხისტყაოსანი", author: "შოთა რუსთაველი" },
      { name: "დიდოსტატის მარჯვენა", author: "კონსტანტინე გამსახურდია" }
    ];

    const artists = [
      {
        name: "ნიკო ფიროსმანი",
        img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Niko_Pirosmani.jpg"
      },
      {
        name: "ლადო გუდიაშვილი",
        img: "https://upload.wikimedia.org/wikipedia/commons/7/7e/Lado_Gudiashvili.jpg"
      }
    ];

    function showBooks() {
      currentData = books;
      displayBooks(books);
    }

    function showArtists() {
      currentData = artists;
      displayArtists(artists);
    }

    function displayBooks(data) {
      const result = document.getElementById("result");
      result.innerHTML = "";

      data.forEach(item => {
        result.innerHTML += `
          <div class="card">
            <h3>${item.name}</h3>
            <p>${item.author}</p>
          </div>
        `;
      });
    }

    function displayArtists(data) {
      const result = document.getElementById("result");
      result.innerHTML = "";

      data.forEach(item => {
        result.innerHTML += `
          <div class="card">
            <img src="${item.img}">
            <h3>${item.name}</h3>
          </div>
        `;
      });
    }

    function searchData() {
      const value = document.getElementById("search").value.toLowerCase();

      const filtered = currentData.filter(item =>
        item.name.toLowerCase().includes(value)
      );

      if (currentData === books) {
        displayBooks(filtered);
      } else {
        displayArtists(filtered);
      }
    }
  </script>

</body>
</html>
