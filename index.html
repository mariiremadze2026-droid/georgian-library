<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Georgian Library</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>📚 Georgian Library</h1>

  <!-- 🔍 SEARCH -->
  <input type="text" id="search" placeholder="ძებნა..." oninput="searchData()">

  <!-- 🎯 მთავარი ღილაკები -->
  <div class="buttons">
    <button onclick="showBooks()">📚 წიგნები</button>
    <button onclick="showArtists()">🎨 მხატვრები</button>
  </div>

  <!-- 📦 შედეგები -->
  <div id="result"></div>

  <!-- ✉️ ქვედა ნაწილი -->
  <input class="bottom-input" id="message" type="text" placeholder="მითხარი რამე...">

  <div class="buttons">
    <button onclick="sendMessage()">გაგზავნა</button>
    <button onclick="share()">📩 გაზიარება</button>
  </div>

  <!-- 🧠 SCRIPT -->
  <script>

    let currentData = [];

    const books = [
      { name: "ვეფხისტყაოსანი", author: "შოთა რუსთაველი" },
      { name: "დიდოსტატის მარჯვენა", author: "კონსტანტინე გამსახურდია" },
      { name: "ბაში-აჩუკი", author: "აკაკი წერეთელი" }
    ];

    const artists = [
      {
        name: "ნიკო ფიროსმანი",
        img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Niko_Pirosmani.jpg",
        bio: "ცნობილი ქართველი მხატვარი"
      },
      {
        name: "ლადო გუდიაშვილი",
        img: "https://upload.wikimedia.org/wikipedia/commons/7/7e/Lado_Gudiashvili.jpg",
        bio: "ქართული მოდერნიზმის წარმომადგენელი"
      },
      {
        name: "ელენე ახვლედიანი",
        img: "https://upload.wikimedia.org/wikipedia/commons/6/6e/Elene_Akhvlediani.jpg",
        bio: "ცნობილი ქართველი მხატვარი ქალი"
      }
    ];

    function showBooks() {
      currentData = books;
      displayBooks(books);
    }

    function showArtists() {
      currentData = artists;
      displayArtists(artists);
    }

    function displayBooks(data) {
      const result = document.getElementById("result");
      result.innerHTML = "";

      data.forEach(item => {
        result.innerHTML += `
          <div class="card">
            <h2>${item.name}</h2>
            <p>${item.author}</p>
          </div>
        `;
      });
    }

    function displayArtists(data) {
      const result = document.getElementById("result");
      result.innerHTML = "";

      data.forEach(item => {
        result.innerHTML += `
          <div class="card">
            <img src="${item.img}">
            <h2>${item.name}</h2>
            <p>${item.bio}</p>
          </div>
        `;
      });
    }

    function searchData() {
      const value = document.getElementById("search").value.toLowerCase();

      const filtered = currentData.filter(item =>
        item.name.toLowerCase().includes(value)
      );

      if (currentData === books) {
        displayBooks(filtered);
      } else {
        displayArtists(filtered);
      }
    }

    function sendMessage() {
      const msg = document.getElementById("message").value;
      alert("შენ დაწერე: " + msg);
    }

    function share() {
      alert("გაზიარება მალე დაემატება 📩");
    }

  </script>

</body>
</html>
