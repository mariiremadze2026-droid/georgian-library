<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Georgian Library</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>📚 Georgian Library</h1>

  <input type="text" id="search" placeholder="ძებნა...">

  <div class="container">
    <button class="button" onclick="showBooks()">📚 წიგნები</button>
    <button class="button" onclick="showArtists()">🎨 მხატვრები</button>
  </div>

  <div id="result"></div>

  <script>
    const books = [
      { name: "ვეფხისტყაოსანი", author: "შოთა რუსთაველი" },
      { name: "დიდოსტატის მარჯვენა", author: "კონსტანტინე გამსახურდია" }
    ];

    const artists = [
      { name: "ნიკო ფიროსმანი" },
      { name: "ლადო გუდიაშვილი" }
    ];

    function showBooks() {
      const result = document.getElementById("result");
      result.innerHTML = "";

      books.forEach(book => {
        result.innerHTML += `
          <div class="card">
            <h3>${book.name}</h3>
            <p>${book.author}</p>
          </div>
        `;
      });
    }

    function showArtists() {
      const result = document.getElementById("result");
      result.innerHTML = "";

      artists.forEach(artist => {
        result.innerHTML += `
          <div class="card">
            <h3>${artist.name}</h3>
          </div>
        `;
      });
    }
  </script>

</body>
</html>
