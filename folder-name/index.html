<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Mafia Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎭 Mafia Game</h1>

<div id="setup">
  <input id="playerName" placeholder="შეიყვანე სახელი">
  <button onclick="addPlayer()">➕ დამატება</button>
  <ul id="players"></ul>
  <button onclick="startGame()">🚀 დაწყება</button>
</div>

<div id="game" class="hidden">
  <h2 id="phase">🌙 Night</h2>
  <div id="info"></div>
  <div id="actions"></div>
  <button onclick="nextPhase()">➡️ შემდეგი</button>
</div>

<script src="script.js"></script>
</body>
</html>
