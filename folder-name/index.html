<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Mafia Imposter</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>👨‍🚀 Mafia Imposter</h1>

<div id="setup">
  <input type="number" id="players" placeholder="მოთამაშეების რაოდენობა">
  <button onclick="startGame()">დაწყება</button>
</div>

<div id="game" style="display:none;">

  <h2 id="playerTitle"></h2>

  <button onclick="showRole()">როლის ნახვა</button>

  <div id="roleBox" style="display:none;">
    <h2 id="roleText"></h2>
    <button onclick="nextPlayer()">შემდეგი</button>
  </div>

  <h2 id="phaseText"></h2>
  <button onclick="nextPhase()">შემდეგი ფაზა</button>

  <div id="voteArea"></div>

</div>

<script src="script.js"></script>

</body>
</html>
